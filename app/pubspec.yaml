name: blowfit
description: BlowFit — expiratory resistance training companion app.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.0
  fl_chart: ^0.68.0
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  path: ^1.9.0
  path_provider: ^2.1.3
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
